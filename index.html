<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>College Popup</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background: url('https://images.unsplash.com/photo-1523050854058-8df90110c9f1') no-repeat center center/cover;
    }

    .popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      background: white;
      padding: 20px 30px;
      border-radius: 10px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      text-align: center;
      transition: 0.3s ease;
    }

    .popup.active {
      transform: translate(-50%, -50%) scale(1);
    }

    .popup h2 {
      margin: 0 0 10px;
    }

    .popup button {
      padding: 8px 15px;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    .show-btn {
      padding: 12px 20px;
      background: black;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }
  </style>
</head>
<body>

  <button class="show-btn" onclick="showPopup()">Click Me</button>

  <div class="popup" id="popup">
    <h2 id="message">I am not coming</h2>
    <button onclick="hidePopup()">Close</button>
  </div>

  <script>
    const messages = [
      "I am not coming 😅",
      "Not today bro!",
      "Skipping college today!",
      "Maybe tomorrow 😂",
      "No mood for classes!"
    ];

    function showPopup() {
      const popup = document.getElementById('popup');
      const message = document.getElementById('message');

      // Pick random message
      const randomIndex = Math.floor(Math.random() * messages.length);
      message.textContent = messages[randomIndex];

      popup.classList.add('active');
    }

    function hidePopup() {
      document.getElementById('popup').classList.remove('active');
    }

    // Auto popup after random time
    setTimeout(() => {
      showPopup();
    }, Math.random() * 3000 + 1000);
  </script>

</body>
</html>
